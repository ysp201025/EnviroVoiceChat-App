<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <title>EnviroVoice</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="img/title-light.png" alt="EnviroVoice" class="title-img title-light" />
        <img src="img/title-dark.png" alt="EnviroVoice" class="title-img title-dark" />
      </div>

      <!-- Screen 1: Setup (Gamertag + URL input + Save button) -->
      <div id="setupSection">
        <div class="section">
          <label for="gamertagInput">Minecraft Gamertag/Xbox Live Username:</label>
          <input type="text" id="gamertagInput" class="input-field" />
          <p id="gamertagStatus" class="status-text">
            ⚠️ Enter your gamertag to continue
          </p>
        </div>

        <div class="section">
          <label for="roomUrlInput">Voice Channel URL:</label>
          <input type="text" id="roomUrlInput" class="input-field" />
          <p id="roomInfo" class="status-text"></p>
        </div>

        <div class="section">
          <button id="saveProfileBtn" class="primary-btn save-btn">Save</button>
        </div>
      </div>

      <!-- Screen 2: Ready screen (shows saved info + Join + Edit) -->
      <div id="readySection" style="display: none;">
        <div class="section saved-profile-card">
          <div class="saved-profile-row">
            <span class="saved-label">🎮 Gamertag:</span>
            <span id="savedGamertagDisplay" class="saved-value"></span>
          </div>
          <div class="saved-profile-row">
            <span class="saved-label">🔗 Voice Channel:</span>
            <span id="savedUrlDisplay" class="saved-value saved-url"></span>
          </div>
        </div>

        <div class="section ready-actions">
          <button id="connectToRoomBtn" class="primary-btn join-btn">Join</button>
          <button id="editProfileBtn" class="secondary-btn edit-btn">Edit</button>
        </div>
      </div>

      <!-- Controles de llamada -->
      <div id="callControls" class="call-controls" style="display: none">
        <!-- Selector de Micrófono -->
        <div class="mic-selector-container">
          <label for="micSelector">MICROPHONE</label>
          <select id="micSelector" class="mic-selector">
            <option value="">Loading microphones...</option>
          </select>
        </div>

        <div class="controls-row status-panel">
          <button id="exitBtn" class="control-btn exit">Disconnect</button>
        </div>

        <!-- Push to Talk (solo PC) -->
        <div id="pttContainer" class="ptt-container" style="display: none;">
          <div class="ptt-header">
            <label class="ptt-label">
              <input type="checkbox" id="pttToggle" class="ptt-checkbox" />
              <span>🎙️ Push to Talk (Hold key to speak)</span>
            </label>
          </div>
          <div id="pttKeySelector" class="ptt-key-selector" style="display: none;">
            <label for="pttKeyInput">Click to change key:</label>
            <button type="button" id="pttKeyInput" class="ptt-key-button">V</button>
            <span id="pttKeyDisplay" class="ptt-key-display">Press and hold to talk</span>
          </div>
        </div>

        <div
          id="gameStatus"
          class="game-status"
          style="
            margin-top: 16px;
            padding: 12px;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 8px;
            text-align: center;
            font-size: 0.875rem;
          "
        >
          <span style="color: #94a3b8">Loading...</span>
        </div>

        <div class="participants-section">
          <h3>Participants</h3>
          <div id="participantsList" class="participants-list"></div>
        </div>
      </div>
    </div>

    <!-- Botón de modo -->
    <button id="darkModeToggle"></button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="script.js"></script>
    <script src="colorMode.js"></script>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body>
</html>
